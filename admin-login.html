<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Drop for Africa</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
  <nav>
    <div class="nav-content">
      <a class="logo" href="index.html">
        <img src="DropForAfrica-300x106.png" alt="Drop for Africa Logo">
      </a>
      <button class="menu-toggle" aria-label="Open Menu"><i class="fas fa-bars"></i></button>
      <ul class="menu">
        <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="admin-login.html"><i class="fas fa-sign-in-alt"></i> Admin Login</a></li>
      </ul>
    </div>
  </nav>

  <section class="section" style="min-height: calc(100vh - 140px); display: flex; align-items: center; justify-content: center;">
    <div class="booking-form" style="max-width: 480px; margin: 0 auto;">
      <div class="section-heading">
        <h2>Admin Login</h2>
        <p>Sign in to view booking metrics, comments and tour performance.</p>
      </div>
      <form id="adminLoginForm">
        <input name="email" type="email" placeholder="Admin email" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit" class="btn btn-primary">Sign In</button>
        <p id="loginMessage" style="margin-top: 1rem; color: #bb2a2a;"></p>
      </form>
    </div>
  </section>

  <footer>
    <p>Secure admin access for Drop for Africa booking metrics.</p>
  </footer>

  <script src="admin-login.js"></script>
</body>
</html>
